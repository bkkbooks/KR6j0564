body:
  text: 隋三藏法師闍那崛多譯如是我聞一時婆伽婆在雞羅娑山頂諸天所居仙人住處與大比丘衆五百人俱復有五百諸大菩薩摩訶薩衆俱其名曰彌勒菩薩虛空藏菩薩普賢菩薩無邊華菩薩普華菩薩等此諸菩薩皆悉住於一生補處紹尊位者爾時世尊於彼林中與諸大衆前後圍繞時一比丘為鬼所持形體裸露不自覺知舉手叫喚言語麁獷更一比丘著邪背佛在虛空中嗚呼出聲不得自在時虛空藏菩薩見聞是已即從坐起偏袒右肩右膝著地合掌向佛白言世尊是虛空中作是聲者誰之所為復何因緣此一比丘形體裸露舉手唱叫爾時世尊告虛空藏菩薩摩訶薩言善男子是一比丘惡鬼所捉復一比丘著於邪魅時虛空藏菩薩白佛言世尊如來今日憐愍一切諸衆生故除滅一切諸病苦故應説神呪爾時世尊以神通力令虛空中有六如來忽然而現各各説呪一名毗婆尸佛二名尸棄佛三名毗舍浮佛四名拘婁孫佛五名拘那含牟尼佛六名迦葉佛時毗婆尸佛住在虛空為護一切諸衆生故除滅一切惡邪鬼故而説呪曰南無佛陀耶一南無達摩耶二南無僧伽耶三唵四呵羅呵羅五醯隸醯隸醯羅耶六南莫結隸結羅耶七闍健模柘那耶八南無那摩蘇婆訶爾時毗婆尸佛説是呪已告虛空藏菩薩言善男子若清信士及清信女有能受持讀誦於是陀羅尼者一切刀杖不能加損一切水火所不能害非人惡鬼不能侵惱終不橫死若中毒藥變成美食易消無病若欲食時先取一匙七遍呪之然後乃食能除一切呪詛厭魅一切諸病皆得除愈壽命延長耳所聞事憶持不忘於睡眠中夢見諸佛若復有人被厭魅者於其耳邊誦呪七遍是人聞已即便除愈若復有人著於癲病及白癲者應以蘇摩那華熏胡麻為油取青木香青蓮華懷香草東門東皆悉等分令使作末和油煎之呪一百八遍塗其身上即便除愈一切諸病皆能破之爾時尸棄佛住在虛空為護一切衆生除一切病斷一切鬼邪故説是神呪南無佛陀耶一南無達摩耶二南無僧伽耶三南無尸棄泥多他伽多耶四唵五鉢柘鉢柘六波柘耶七薩婆菩多男八闡大邏耶九鉢邏毗甜十薩婆呵爾時尸棄如來説是呪已告虛空藏菩薩言善男子是陀羅尼無量百千億那由他諸佛所説我今亦説為欲憐愍一切衆生除一切病却一切鬼及諸惡夢枉橫死等虛空藏若善男子及善女人有能晝夜憶念誦持是神呪者終不為於惡病所惱及諸惡人之所魅於睡眠中夢見諸佛若捨身時得值彼佛於其佛所剋獲道證虛空藏是陀羅尼威力無量我今為汝更略説之若有善男子善女人欲斷一切病當取五色縷結其呪索若有疫病取蘇摩那華油呪一百八遍塗其身上即得除愈若護自身令安隱者呪水一百八遍散於四方結其界場取五色縷結呪索帶行小兒著邪者取青色縷結為呪索若值惡邪之所嬈亂悶無省者於其耳邊誦是陀羅尼乃至七遍即得除愈如是等一切事中隨意所用爾時毗舍浮佛住在虛空為護一切除諸衆生一切病苦斷一切惡鬼故説是陀羅尼南無佛陀耶一南無達摩耶二南無僧伽耶三南無毗舍浮誓多他伽多耶四唵五迦羅迦羅迦羅六居路居路七居盧蹉大男八居嚧薩婆伽羅拏九蘇婆呵十爾時毗舍浮佛説是呪已告虛空藏菩薩言善男子是陀羅尼賢劫之中所有諸佛及三世諸佛皆悉説之我今亦説虛空藏汝應護持若有善男子善女人受持讀誦是陀羅尼一切刀杖所不能害一切惡毒亦不能傷諸瘧熱病皆得遠離水不能漂火不能燒終不橫死一切惡病亦不能侵唯除宿業定報若有比丘比丘尼優婆塞優婆夷於晨朝時應淨澡浴著淨潔衣在佛像前燒好妙香誦持是呪足一百八遍一切厭魅呪詛等事悉不能害一切病苦皆能遠離捨除諸障壽命延長所有錢財什物隨心所樂莫不稱遂若有惡人惡賊縣官帝主先意慰喻一切衆生無不同意若有恐怖鬪諍縣官所對者取白色縷誦呪一百八遍結呪索帶行者於諸事中皆悉得勝若欲長壽者取酪蜜稻穀華和之以匙抄呪一遍擲火中乃至一千八遍即便如意若欲除自他諸障念一切錢財珍寶等離一切惡成就一切功巧受持一切呪降諸怨敵者取懷香草香末香尸利沙華多伽羅香石上華恭居摩香香附子帝釋手草香樹枝出白汁者取等分作末和之呪一千八遍塗身上即得如意若欲見縣官大臣等取樹枝出白汁者然火呪胡麻一撮呪一遍擲著火中燒之乃至一千八遍即得如意若欲治毒藥者於佛像前用泥塗地取紫剛木枝長二寸截一百八枚內酥蜜中一一稱彼人名字擲著火中呪之即得如意若欲除一切惡鬼者取燒死尸殘火頭一百八枚各呪一遍擲火中燒之即便除愈如是等一切處中用悉皆得唯除損害衆生身命爾時拘婁孫佛住在虛空為護一切衆生除一切病斷一切惡及鬼魅故説是呪曰南無佛陀耶一南無達摩耶二南無僧伽耶三那莫迦囉腳村大耶四多他伽多耶五阿囉漢坻六三藐迦三佛陀耶七唵八迦吒迦吒迦吒迦吒九翅致翅致翅致迦耶十那莫薩婆多他伽坻馥十一阿囉呵大地耶十二三藐三菩提毗脾咩反邪蘇婆呵十三爾時拘婁孫佛説是呪已告虛空藏菩薩言善男子是陀羅尼乃至恆河沙等同名拘婁孫佛并及三世諸佛所説讚歎隨喜若人受持是神呪者於未來世末劫之中建立三寶能生正信若比丘比丘尼優婆塞優婆夷於晨朝時淨潔洗浴著新淨衣辦具種種妙好香華供養於佛誦念是呪一百八遍彼人則能知於七世宿命之事若生天上為天中尊若在人間得作人主若能如法盡命受持捨壽之時生安樂國若能如是常誦持者於現身中離於一切種種病苦得陀羅尼聞持不忘若欲飲食未入口時先呪七遍然後食之如是則離一切毒病若欲為他除災患者呪於淨水一千八遍用澡浴身然後行之若呪惡瘡用赤銅刀子如是等諸事誦呪七遍即便如意若能常誦持者錢財自然破一切毒一切障礙惡鬼魔邪皆悉遠離若欲得見於佛身者至清淨處若在道場或在塔前牛糞泥地燒沈水香誦於此呪一千八遍頭東向臥夢見諸佛隨心所願無不稱遂彼佛如來即便開示是汝命長是汝命短或有缺少如是等事悉皆示現爾時拘那含牟尼佛住在虛空為護一切衆生迷荒除一切病斷一切惡諸鬼魅故而説是呪南無佛陀耶一南無達摩耶二南無僧伽耶三那莫迦那迦謨那頤四多他伽多耶五阿囉漢坻六三藐迦三佛陀耶七唵八薩囉薩囉薩囉薩囉九賜囉波耶十達摩達摩達摩達摩十一度無度無度摩耶十二那莫迦那無那頤十三多他伽多耶十四阿囉漢坻十五三藐迦三佛陀耶十六悉淀妬漫多囉鉢大十七蘇婆呵十八爾時拘那含牟尼佛説是呪已告虛空藏菩薩言善男子是陀羅尼若有善男子善女人常能讀誦受持之者是人永得離於怖畏及諸怨敵水不能漂火不能燒一切毒藥若誤食者變成甘美資身益壽無有橫病橫死等難壽命延長增加官位常為一切諸佛護念若有先業諸障起時日三誦之悉得除愈若欲治他疾病苦者隨所有力辦於食飲及雜香華若沈水香若熏陸香作淨好湯呪千八遍洗浴於身爾乃行呪是諸病苦及惡邪鬼所附著者皆得除愈若治癩病身體腫癖風冷病等取菖蒲末以白蜜和佛前誦呪一千八遍空腹服之即便除愈若有四日三二一日諸瘧病者亦於佛前用牛糞泥塗道場地取蘇摩那華以用作鬘著於頭上即便遠離若被厭魅乃至悶絶不覺知者於其耳邊為誦此呪一百八遍即便除愈若有羊癲及諸狂病或為迦吒富單那毗舍遮鬼等之所著者於佛像前以牛糞泥塗地如上燒好妙香取所供養佛前萎華呪一千八遍火中燒之熏其鼻孔即得除愈如是等一切病中隨其事用爾時迦葉佛住在虛空為護一切無量衆生除一切病斷一切惡諸邪魅故説是神呪南無佛陀耶一南無達摩耶二南無僧伽耶三南無迦葉波多他伽多耶四唵五呵囉呵囉呵囉呵囉六呵呵呵七南無迦葉波耶八阿囉漢坻九三藐三佛陀耶十悉著呵妬十一摩多囉鉢陀十二蘇婆呵十三爾時迦葉佛説是呪已告虛空藏菩薩言善男子是陀羅尼三十三恆河沙等諸佛所説汝當受持讀誦修行虛空藏若有善男子善女人晝夜三時誦是呪者即得現前夢見諸佛離諸業障唯除宿世決定報耳於一切事隨意所欲若有癩病及白癩等於佛像前牛糞泥地燒好妙香取供養佛所有萎華呪一千八遍搗末水和佛前服之即得除愈若有長病及諸疫疾治法亦然若病頭痛亦用華末塗其額上女人難産用此華末和油煎之塗其女根有如是等隨其事用無不蒙益若疥濕瘡亦用萎華細末酥和火上煎之呪千八遍塗上即愈若欲止雨亦取萎華呪千八遍露地燒之令其作煙即時便晴若大風起雷電震雹亦得除止若著瘧病一日二日乃至四日亦取萎華呪千八遍細搗作末酒和服之即時除愈著羊癲者呪華如前若燒若服皆得除愈若被魅或毗舍遮諸鬼神等之所捉持或風冷病月食病等和水服之諸如是等一切疾病悉於佛前牛糞泥地呪於萎華一千八遍或燒或服皆悉除愈各受安樂勿生疑惑應決定信隨心用之爾時釋迦如來亦在虛空為護一切無量衆生除一切病斷一切惡諸邪鬼故説是神呪南無佛陀耶一南無達摩耶二南無僧伽耶三南無貰迦牟尼夷四多他伽多耶五阿囉漢坻六三藐三佛陀耶七多地他懼迷懼迷八摩呵懼迷九多梨多梨十摩訶多梨十一柘梨柘梨十二摩呵柘梨十三大𠼝大𠼝十四摩呵大梨十五帝𠼝帝𠼝十六摩呵帝梨十七呵呵翅隸翅隸十八摩呵翅隸十九諸嚧諸嚧二十摩呵諸嚧二十一覓隸覓隸二十二摩呵覓隸二十三帝隸帝隸二十四摩呵帝隸二十五度迷度迷二十六摩呵度迷二十七柘梨柘梨二十八摩呵柘梨二十九詰唎詰唎三十摩呵詰唎三十一折隸折隸三十二摩呵折隸三十三蘇婆呵三十四爾時釋迦如來説是呪已告虛空藏菩薩言虛空藏若善男子善女人受持讀誦是陀羅尼者一切刀杖所不能加一切水火亦不能害一切惡病所不能惱終不橫死如前六佛所説神呪等無有異爾時虛空藏菩薩摩訶薩白佛言世尊如上諸佛所説神呪我當護持我今亦説護持一切無量衆生除一切障斷一切業滅一切罪消一切殃去一切鬼却一切邪愈一切病以如是故説此神呪阿他佉羅利一迦伽囉二菩提薩埵三摩呵薩埵四婆伽婆梨多五迷多大符柘多六阿呵摩七婆伽婆八喻婆煩塞九薩鞞衫鉢唎波簸十遲耶南十一尼婆囉膩十二薩婆浮休多十三尼婆囉膩十四薩婆嚧伽十五尼婆囉膩十六哆地夜他十七至詈至詈十八摩訶至詈十九妬漏妬漏二十摩訶妬漏二十一夕和隸夕和隸二十二摩訶夕和隸二十三𭈇馨翅反詈𭈇詈二十四摩訶𭈇詈二十五蘇婆呵二十六爾時虛空藏菩薩摩訶薩説是呪已白佛言世尊如是神呪無量神力不可思議若有善男子善女人惡鬼所持以諸縷綖作於呪索一百八遍帶行坐者是諸惡鬼即便捨離復更取蘇摩那華好淨牛酥白芥子等和置一處誦呪一遍一擲火中如是乃至一百八遍一百八擲即得除愈若有惡人欲來害已取鑌鐵刀子呪一百八遍斫彼惡人所行道徑便不能害或復呪水散於四方結四方界止住其中一切諸惡則不能加欲護自身令無損者以五色縷索作於繩呪百八遍坐起帶行若欲除毒手把藥草以呪呪之若為除病應當呪油一百八遍塗之即愈若患耳者取青木香細搗作末油內煎之著於耳中若患腹者呪於薑水一百八遍服之即愈若患牙齒蟲風齲者取蘇摩那木枝呪一百八遍以口嚼之并揩牙齒即便除愈小兒患者當結白縷以為呪索令其帶行若患頭者或用刀子或用於手呪百八遍即得除愈若被魅當呪刀子以用解之若斷惡風雹雨呪石榴枝以用擬之斷惡毒藥呪水用之諸如是等一切事中隨意所用於一切處在佛像前泥地散華燒香如法受持如是諸佛所説此呪經已虛空藏菩薩并及一切諸大菩薩阿羅漢等聞佛所説歡喜奉行
